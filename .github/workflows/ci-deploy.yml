name: CI Pipeline
run-name: Run

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build:web

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Execute remote SSH deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            set -e
            APP_NAME="${{ vars.APP_NAME || 'ProgressTracker' }}"
            BASE_DIR="${{ vars.DEPLOY_BASE_DIR || '~/Deploy' }}"
            BRANCH="master"
            REPO_URL="${{ secrets.DEPLOY_REPO_URL }}"
            TARGET_DIR="${BASE_DIR}/${APP_NAME}"

            if [ -z "${REPO_URL}" ]; then
              echo "DEPLOY_REPO_URL secret is not set"
              exit 1
            fi

            mkdir -p "${BASE_DIR}"

            if [ -d "${TARGET_DIR}/.git" ]; then
              cd "${TARGET_DIR}"
              git fetch origin "${BRANCH}"
              git checkout "${BRANCH}"
              git reset --hard "origin/${BRANCH}"
            else
              git clone --branch "${BRANCH}" "${REPO_URL}" "${TARGET_DIR}"
              cd "${TARGET_DIR}"
            fi

            chmod +x scripts/deploy.sh
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export SESSION_COOKIE_NAME="${{ vars.SESSION_COOKIE_NAME || 'progress_tracker_session' }}"
            export NGINX_DIR="${{ vars.NGINX_DIR || '/var/www/progress-tracker' }}"
            ./scripts/deploy.sh
