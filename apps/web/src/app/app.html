<tui-root>
  @if (userStore.isReady()) {
    <main class="app-shell flex min-h-screen flex-col pb-10">
      @if (showHeader()) {
        <header class="border-b border-slate-200 bg-white">
          <div class="mx-auto flex w-full max-w-6xl items-center justify-between gap-3 px-4 py-3">
            <nav class="flex flex-wrap items-center gap-4 text-sm">
              <a
                routerLink="/dashboard"
                routerLinkActive="text-blue-600"
                class="font-medium text-slate-700 hover:text-blue-600"
              >
                Dashboard
              </a>
              <a
                routerLink="/tasks"
                routerLinkActive="text-blue-600"
                class="font-medium text-slate-700 hover:text-blue-600"
              >
                Tasks
              </a>
              <a
                routerLink="/stats"
                routerLinkActive="text-blue-600"
                class="font-medium text-slate-700 hover:text-blue-600"
              >
                Stats
              </a>
              <a
                routerLink="/logs"
                routerLinkActive="text-blue-600"
                class="font-medium text-slate-700 hover:text-blue-600"
              >
                Logs
              </a>
            </nav>
            <app-button appearance="outline-grayscale" size="s" (click)="logout()">Logout</app-button>
          </div>
        </header>
      }
      @if (showHeader()) {
        @if (trackingStore.currentSession(); as active) {
          <div class="fixed bottom-4 right-4 z-50 w-[min(24rem,calc(100vw-2rem))] rounded-xl border border-sky-200 bg-sky-50 p-3 shadow-md">
            <div class="flex items-center justify-between gap-3 text-sm">
              <span class="min-w-0 truncate font-medium text-sky-900">
                Tracking:
                <a
                  [routerLink]="['/task', active.taskId]"
                  class="underline-offset-2 hover:underline"
                >
                  {{ active.taskName }}
                </a>
                - {{ formatElapsedMinutes(trackingStore.elapsedMinutes()) }}
              </span>
              <app-button appearance="outline-grayscale" size="s" (click)="stopTrackingFromHeader()">
                Stop
              </app-button>
            </div>
          </div>
        }
      }
      <router-outlet />
    </main>
  }
</tui-root>
